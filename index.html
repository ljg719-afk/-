<script>
const ADMIN_PW="admin2025",UNLOCK_CODE="2025",PASS_SCORE=24,TOTAL=40;
const ANS=[3,4,2,5,1,3,2,4,5,3,2,4,1,3,5,2,4,1,3,5,2,3,4,1,5,3,2,4,1,3,5,2,4,1,3,2,5,3,4,1];
const SECS=[{"t":"제1절 노화에 따른 변화와 노인성 질환의 특성(1~5번)","s":1,"e":5},{"t":"제2절 신체계통별 주요 질환(6~30번)","s":6,"e":30},{"t":"제3절 노인증후군과 노쇠(31~40번)","s":31,"e":40}];
const Q=[{"q":"노화에 따른 신체적 변화에 대한 설명으로 옳은 것은?","o":["노화가 진행되면 근육량이 증가한다","노화가 진행되면 뼈의 밀도가 높아진다","노화가 진행되면 신체 기능이 점차 저하되고 질병에 대한 저항력이 약해진다","노화가 진행되어도 면역력에는 변화가 없다","노화는 60세 이후에만 시작된다"],"e":"노화란 나이가 들면서 신체의 구조와 기능이 점차 저하되는 과정입니다. 근육량과 뼈 밀도가 감소하고, 면역력이 약해져서 질병에 대한 저항력이 떨어집니다. 노화는 특정 나이에 갑자기 시작되는 것이 아니라 서서히 진행됩니다."},{"q":"노인성 질환의 특성으로 옳은 것은?","o":["한 가지 질환만 단독으로 나타난다","젊은 사람과 동일한 증상이 나타난다","치료하면 완전히 회복된다","여러 가지 질환이 동시에 나타나고, 증상이 비전형적이며, 만성적으로 진행되는 경우가 많다","약물 부작용이 거의 나타나지 않는다"],"e":"노인성 질환의 특성은 여러 가지 질환이 동시에 나타나고(복합 이환), 증상이 비전형적이며, 만성적으로 진행되는 경우가 많습니다. 또한 약물 부작용이 잘 나타나고, 완전한 회복보다는 기능 유지와 악화 방지가 목표인 경우가 많습니다."},{"q":"노화에 따른 소화기계의 변화로 옳은 것은?","o":["위산 분비가 증가한다","소화·흡수 기능이 저하되고 장 운동이 느려져 변비가 생기기 쉽다","침 분비가 증가한다","식욕이 더 왕성해진다","장 운동이 빨라진다"],"e":"노화가 진행되면 침 분비가 감소하여 입이 마르고, 위산 분비가 줄어들며, 장 운동(연동운동)이 느려져서 소화·흡수 기능이 저하됩니다. 이로 인해 변비가 생기기 쉽고, 영양소 흡수도 줄어듭니다."},{"q":"노화에 따른 호흡기계의 변화로 옳은 것은?","o":["폐활량이 증가한다","호흡 근육의 힘이 강해진다","기침 반사가 강해진다","섬모 운동이 활발해진다","폐활량이 감소하고 기침 반사가 약해져 호흡기 감염에 취약해진다"],"e":"노화가 진행되면 폐의 탄력이 감소하고 호흡 근육의 힘이 약해져서 폐활량이 줄어듭니다. 기도의 섬모 운동과 기침 반사도 약해져서 이물질이나 세균을 효과적으로 배출하지 못하게 되어 폐렴 등 호흡기 감염에 취약해집니다."},{"q":"노화에 따른 심혈관계의 변화로 옳은 것은?","o":["혈관의 탄력이 감소하고 혈압이 상승하는 경향이 있다","심장의 기능이 더 좋아진다","혈관이 더 유연해진다","혈액 순환이 더 활발해진다","동맥경화는 노화와 관련이 없다"],"e":"노화가 진행되면 혈관 벽이 두꺼워지고 탄력이 감소하여 혈압이 상승하는 경향이 있습니다. 심장의 펌프 기능도 떨어지고, 동맥경화(혈관이 좁아지고 딱딱해지는 것)가 진행되어 심장질환, 뇌졸중 등의 위험이 높아집니다."},{"q":"노인에게 흔한 소화기계 질환인 '위식도역류질환'의 증상으로 옳은 것은?","o":["설사가 자주 발생한다","손발이 저리다","가슴이 타는 듯한 느낌(속쓰림)과 신물이 올라오는 증상이 나타난다","소변이 자주 마렵다","귀에서 소리가 난다"],"e":"위식도역류질환은 위의 내용물이 식도로 역류하여 발생하는 질환입니다. 가슴이 타는 듯한 느낌(속쓰림, 가슴앓이)과 신물이 올라오는 것이 대표적인 증상입니다. 식후 바로 눕지 않고, 취침 전 2~3시간 전에는 음식 섭취를 피하며, 상체를 높여 자는 것이 도움이 됩니다."},{"q":"노인의 변비 예방과 관리 방법으로 옳은 것은?","o":["수분 섭취를 줄인다","식이섬유(채소, 과일, 잡곡)가 풍부한 음식을 먹고, 수분을 충분히 섭취하며, 규칙적으로 운동한다","하루 종일 누워 있는다","변비약을 매일 복용한다","고기만 먹는다"],"e":"노인의 변비 예방을 위해서는 식이섬유(채소, 과일, 잡곡)가 풍부한 음식을 먹고, 하루 6~8잔의 물을 충분히 마시며, 규칙적인 운동(걷기 등)을 하는 것이 중요합니다. 규칙적인 배변 습관을 들이고, 변비약은 의사의 처방에 따라 사용해야 합니다."},{"q":"노인에게 흔한 호흡기계 질환인 '폐렴'에 대한 설명으로 옳은 것은?","o":["노인 폐렴은 항상 고열이 나타난다","폐렴은 전염되지 않는다","노인은 젊은 사람보다 폐렴에 잘 걸리지 않는다","노인 폐렴은 발열이 없을 수 있고, 식욕 저하·기운 없음 등 비전형적 증상으로 나타나기도 한다","폐렴은 약 없이 저절로 낫는다"],"e":"노인 폐렴은 젊은 사람과 달리 고열이 나타나지 않는 경우가 많습니다. 식욕 저하, 기운 없음, 의식 혼미 등 비전형적 증상으로 나타나 발견이 늦어질 수 있습니다. 노인은 면역력이 약해 폐렴의 위험이 높고, 사망률도 높으므로 조기 발견과 치료가 중요합니다."},{"q":"노인의 '흡인성 폐렴'을 예방하기 위한 방법으로 옳은 것은?","o":["식사 시 고개를 뒤로 젖히게 한다","누운 자세로 음식을 먹게 한다","빨리 먹도록 재촉한다","식사 전에 반드시 양치를 하지 않아도 된다","식사 시 상체를 세우고 고개를 약간 숙인 자세를 유지하며, 천천히 먹게 한다"],"e":"흡인성 폐렴은 음식물이나 구강 내 세균이 기도로 들어가 발생하는 폐렴입니다. 예방을 위해 식사 시 상체를 60~90도 세우고, 고개를 약간 숙여(턱을 당겨) 천천히 소량씩 먹게 합니다. 식사 전후 구강 청결도 중요합니다."},{"q":"노인에게 흔한 심혈관계 질환인 '고혈압'의 관리로 옳은 것은?","o":["증상이 없으면 약을 먹지 않아도 된다","짠 음식을 많이 먹는다","저염식을 하고, 규칙적으로 약을 복용하며, 적절한 운동을 한다","혈압이 정상으로 돌아오면 약을 중단한다","고혈압은 치료하지 않아도 위험하지 않다"],"e":"고혈압은 대부분 증상이 없지만, 관리하지 않으면 뇌졸중, 심장병, 신장병 등 심각한 합병증을 유발합니다. 저염식(싱겁게 먹기), 규칙적인 약 복용, 적절한 운동, 금연, 절주가 중요합니다. 혈압이 정상이 되어도 의사의 지시 없이 약을 중단하면 안 됩니다."},{"q":"노인에게 흔한 근골격계 질환인 '골다공증'에 대한 설명으로 옳은 것은?","o":["남성에게만 발생한다","젊은 사람에게만 발생한다","통증이 항상 심하게 나타난다","뼈의 밀도가 감소하여 뼈가 약해지고 골절이 쉽게 발생하는 질환이다","치료 방법이 없다"],"e":"골다공증은 뼈의 밀도가 감소하여 뼈가 약해지고, 가벼운 충격에도 골절이 쉽게 발생하는 질환입니다. 특히 폐경 후 여성에게 많이 발생하지만 남성에게도 나타날 수 있습니다. 칼슘과 비타민D 섭취, 규칙적인 운동, 낙상 예방이 중요합니다."},{"q":"노인의 '골절' 예방을 위한 방법으로 옳지 않은 것은?","o":["미끄럼 방지 매트를 깔아준다","충분한 조명을 확보한다","바닥의 장애물을 제거한다","규칙적인 운동으로 근력과 균형감각을 유지한다","슬리퍼를 신고 다니게 한다"],"e":"노인의 골절 예방을 위해 미끄럼 방지 매트, 충분한 조명, 장애물 제거, 규칙적인 운동 등이 중요합니다. 그러나 슬리퍼는 발이 쉽게 빠지고 미끄러질 수 있어 낙상의 원인이 됩니다. 발에 잘 맞고 미끄러지지 않는 신발을 신어야 합니다."},{"q":"노인에게 흔한 '퇴행성 관절염(골관절염)'에 대한 설명으로 옳은 것은?","o":["관절을 많이 사용할수록 좋아진다","관절 연골이 닳아서 통증과 뻣뻣함이 나타나는 질환이다","주로 손가락에만 발생한다","젊은 사람에게 더 많이 발생한다","약을 먹으면 완전히 낫는다"],"e":"퇴행성 관절염(골관절염)은 관절을 보호하는 연골이 닳아 없어지면서 뼈끼리 마찰하여 통증, 부종, 뻣뻣함이 나타나는 질환입니다. 주로 무릎, 엉덩이, 척추 등 체중을 많이 받는 관절에 발생합니다. 적절한 체중 유지, 관절에 무리가 가지 않는 운동(수영, 걷기 등)이 도움이 됩니다."},{"q":"노인에게 흔한 비뇨기계 질환인 '요실금'에 대한 설명으로 옳은 것은?","o":["요실금은 자연스러운 노화 현상이므로 치료가 필요 없다","요실금은 남성에게만 발생한다","자신의 의지와 관계없이 소변이 흘러나오는 것을 말하며, 치료와 관리가 가능하다","수분 섭취를 극도로 제한하면 좋다","요실금이 있으면 운동을 하지 말아야 한다"],"e":"요실금은 자신의 의지와 관계없이 소변이 흘러나오는 증상을 말합니다. 노화 현상이 아니라 치료와 관리가 가능한 질환입니다. 골반근육 강화 운동(케겔 운동), 배뇨 훈련, 약물 치료 등의 방법이 있습니다. 수분을 극도로 제한하면 오히려 요로감염의 위험이 높아집니다."},{"q":"노인 남성에게 흔한 '전립선비대증'의 증상으로 옳은 것은?","o":["설사가 자주 발생한다","시력이 저하된다","혈압이 올라간다","피부에 발진이 생긴다","소변 줄기가 약해지고, 소변을 자주 보며, 잔뇨감이 있다"],"e":"전립선비대증은 전립선이 커지면서 요도를 압박하여 소변 줄기가 약해지고, 소변을 자주 보며(빈뇨), 소변을 봐도 시원하지 않은 느낌(잔뇨감)이 나타나는 질환입니다. 야간에 소변을 보러 자주 깨는 것(야간뇨)도 특징적 증상입니다."},{"q":"노인의 피부 변화에 대한 설명으로 옳은 것은?","o":["피부가 더 두꺼워진다","피지 분비가 증가한다","피부의 탄력이 감소하고 건조해지며, 상처 치유가 느려진다","땀 분비가 증가한다","자외선에 대한 저항력이 강해진다"],"e":"노화가 진행되면 피부의 탄력이 감소하여 주름이 생기고, 피지와 땀 분비가 줄어들어 피부가 건조해집니다. 피부가 얇아지고 혈관이 약해져 멍이 쉽게 들며, 상처 치유 속도가 느려집니다. 자외선에 대한 저항력도 약해지므로 자외선 차단에 신경 써야 합니다."},{"q":"노인에게 발생하기 쉬운 '욕창'의 원인으로 가장 중요한 것은?","o":["과도한 운동","과식","지나친 목욕","같은 자세로 오래 누워 있어 피부에 지속적인 압력이 가해지는 것","자외선 노출"],"e":"욕창은 같은 자세로 오래 누워 있거나 앉아 있을 때 뼈가 돌출된 부위(엉치뼈, 발꿈치, 뒤통수 등)의 피부에 지속적인 압력이 가해져서 혈액 순환이 차단되고 피부와 조직이 손상되는 것입니다. 2시간마다 체위를 변경하고, 영양 상태를 좋게 유지하며, 피부를 청결하고 건조하게 관리하는 것이 예방에 중요합니다."},{"q":"욕창 예방을 위한 요양보호사의 역할로 옳지 않은 것은?","o":["2시간마다 체위를 변경해준다","피부를 청결하고 건조하게 유지한다","영양 상태를 관찰하고 충분한 영양을 섭취하도록 돕는다","욕창 예방 매트리스를 사용한다","한 자세로 오래 누워 있게 하여 편안하게 해준다"],"e":"욕창 예방의 핵심은 한 자세로 오래 있지 않도록 하는 것입니다. 2시간마다 체위를 변경하고, 피부를 청결·건조하게 유지하며, 충분한 영양 섭취를 돕고, 욕창 예방 매트리스(에어매트리스 등)를 사용합니다. 한 자세로 오래 누워 있게 하는 것은 욕창을 유발하는 행위이므로 해서는 안 됩니다."},{"q":"노인의 '낙상'을 유발하는 요인으로 옳지 않은 것은?","o":["시력 저하","근력 저하","어지러움을 유발하는 약물 복용","바닥의 장애물","밝은 조명과 미끄럼 방지 매트"],"e":"낙상을 유발하는 요인에는 시력 저하, 근력 저하, 균형감각 저하, 어지러움을 유발하는 약물, 바닥의 장애물, 어두운 조명, 미끄러운 바닥 등이 있습니다. 밝은 조명과 미끄럼 방지 매트는 낙상을 '예방'하는 요인이므로 낙상 유발 요인이 아닙니다."},{"q":"노인의 감각기계 변화 중 '노인성 난청'에 대한 설명으로 옳은 것은?","o":["저음을 잘 듣지 못한다","한쪽 귀에만 나타난다","노화로 인해 고음을 잘 듣지 못하게 되는 것으로, 양쪽 귀에 서서히 나타난다","갑자기 발생한다","치료하면 완전히 회복된다"],"e":"노인성 난청은 노화로 인해 내이(달팽이관)의 청각 세포가 퇴화하면서 점차 청력이 떨어지는 것입니다. 주로 높은 음(고음)부터 잘 듣지 못하게 되며, 양쪽 귀에 서서히 나타납니다. 말소리를 알아듣기 어려워지므로 대화할 때 또박또박 천천히 말하고, 필요하면 보청기 사용을 권합니다."},{"q":"노인의 '백내장'에 대한 설명으로 옳은 것은?","o":["눈의 수정체가 혼탁해져서 시야가 흐려지는 질환이다","눈에 통증이 심하게 나타난다","젊은 사람에게만 발생한다","안약으로 완치된다","갑자기 시력을 잃는다"],"e":"백내장은 눈의 수정체가 혼탁해져서 물체가 흐리게 보이는 질환입니다. 통증은 없으며, 서서히 진행됩니다. 노화가 주요 원인이며, 수술로 치료할 수 있습니다. 안개가 낀 것처럼 뿌옇게 보이거나, 밝은 빛에 눈이 부시는 증상이 나타납니다."},{"q":"노인의 '녹내장'에 대한 설명으로 옳은 것은?","o":["백내장과 동일한 질환이다","안압이 높아져 시신경이 손상되어 시야가 좁아지는 질환이다","치료하지 않아도 시력이 회복된다","통증이 항상 심하다","어린이에게 주로 발생한다"],"e":"녹내장은 안압(눈 속의 압력)이 높아져서 시신경이 손상되고, 시야가 점차 좁아지는 질환입니다. 초기에는 증상이 거의 없어 '소리 없는 시력 도둑'이라고 불립니다. 치료하지 않으면 실명할 수 있으므로 정기적인 안과 검진이 중요합니다."},{"q":"노인에게 흔한 내분비계 질환인 '당뇨병'에 대한 설명으로 옳은 것은?","o":["혈당이 낮아지는 질환이다","인슐린이 과다하게 분비되는 질환이다","혈액 속의 포도당(혈당)이 비정상적으로 높아지는 질환이다","젊은 사람에게만 발생한다","식이요법과 운동은 효과가 없다"],"e":"당뇨병은 인슐린의 분비나 기능에 문제가 생겨 혈액 속의 포도당(혈당)이 비정상적으로 높아지는 질환입니다. 다음(물을 많이 마심), 다뇨(소변을 자주 봄), 다식(많이 먹음), 체중 감소가 대표적인 증상입니다. 식이요법, 운동, 약물 치료가 중요합니다."},{"q":"당뇨병 대상자에게 '저혈당'이 발생했을 때 요양보호사의 대응으로 옳은 것은?","o":["인슐린을 추가로 투여한다","식사를 거르게 한다","운동을 더 시키다","물만 마시게 한다","의식이 있으면 사탕, 주스, 설탕물 등 당분을 즉시 섭취하게 한다"],"e":"저혈당은 혈당이 지나치게 낮아져서 식은땀, 떨림, 어지러움, 의식 저하 등이 나타나는 응급 상황입니다. 의식이 있으면 사탕, 주스, 설탕물 등 빨리 흡수되는 당분을 즉시 섭취하게 합니다. 의식이 없으면 입에 아무것도 넣지 말고 즉시 119에 신고합니다."},{"q":"노인의 '갑상선기능저하증'에 대한 설명으로 옳은 것은?","o":["체중이 급격히 감소한다","심장이 빠르게 뛴다","더위를 잘 타게 된다","식욕이 왕성해진다","갑상선 호르몬이 부족하여 피로감, 추위를 잘 탐, 체중 증가, 변비 등의 증상이 나타난다"],"e":"갑상선기능저하증은 갑상선 호르몬이 부족하여 신체 대사가 느려지는 질환입니다. 피로감, 추위를 잘 탐, 체중 증가, 변비, 피부 건조, 기억력 감퇴 등의 증상이 나타납니다. 갑상선기능항진증과 반대로 모든 것이 '느려지는' 특징이 있습니다."},{"q":"노인에게 흔한 정신건강 문제인 '우울증'에 대한 설명으로 옳은 것은?","o":["노인 우울증은 자연스러운 노화 현상이므로 치료가 필요 없다","노인 우울증은 신체 증상(두통, 소화불량, 불면 등)으로 나타나는 경우가 많다","노인은 우울증에 걸리지 않는다","우울증은 의지만으로 극복할 수 있다","우울증은 치매와 동일하다"],"e":"노인 우울증은 치료가 필요한 질환이며, 자연스러운 노화 현상이 아닙니다. 노인 우울증의 특징은 기분이 우울하다고 직접 호소하기보다 두통, 소화불량, 불면, 식욕 저하 등 신체 증상으로 나타나는 경우가 많다는 것입니다. 약물 치료와 상담이 효과적이며, 심한 경우 자살로 이어질 수 있으므로 조기 발견이 중요합니다."},{"q":"노인의 우울증과 치매를 구별하는 방법으로 옳은 것은?","o":["우울증과 치매는 구별할 수 없다","우울증은 비교적 갑자기 시작되고 인지기능 저하를 본인이 호소하며, 치매는 서서히 시작되고 인지기능 저하를 부인하는 경향이 있다","치매만 치료가 가능하다","우울증에서는 기억력 저하가 나타나지 않는다","치매는 치료하면 완전히 회복된다"],"e":"노인 우울증과 치매는 기억력 저하라는 공통점이 있어 구별이 어려울 수 있습니다. 우울증에 의한 인지기능 저하(가성 치매)는 비교적 갑자기 시작되고, 본인이 기억력 저하를 호소하며, 치료하면 호전됩니다. 반면 치매는 서서히 시작되고, 본인이 인지기능 저하를 부인하거나 인식하지 못하는 경향이 있습니다."},{"q":"노인의 '섬망'에 대한 설명으로 옳은 것은?","o":["서서히 발생한다","의식이 항상 명료하다","한번 발생하면 영구적이다","갑자기 발생하는 의식 혼란으로, 주의력 저하, 지남력 장애, 환각 등이 나타나며, 원인을 치료하면 회복될 수 있다","야간에만 나타난다"],"e":"섬망은 갑자기 발생하는 의식 혼란 상태로, 주의력 저하, 지남력 장애, 환각, 초조 등의 증상이 나타납니다. 감염, 탈수, 약물 부작용, 수술 후 등이 원인이 될 수 있으며, 원인을 치료하면 회복될 수 있다는 점에서 치매와 다릅니다. 증상이 하루 중에도 변동이 심한 것이 특징입니다."},{"q":"노인의 '대상포진'에 대한 설명으로 옳은 것은?","o":["세균에 의해 발생한다","통증 없이 발진만 나타난다","어린 시절 수두 바이러스가 체내에 잠복해 있다가 면역력이 저하되면 재활성화되어 발생하며, 심한 통증과 수포가 나타난다","양쪽 몸에 동시에 나타난다","치료하지 않아도 후유증이 없다"],"e":"대상포진은 어린 시절 수두를 앓은 후 체내에 잠복해 있던 수두-대상포진 바이러스가 면역력이 저하되었을 때 재활성화되어 발생합니다. 주로 몸의 한쪽에 띠 모양으로 수포(물집)와 심한 통증이 나타납니다. 치료가 늦으면 통증이 수개월~수년간 지속되는 '대상포진 후 신경통'이 남을 수 있습니다."},{"q":"노인에게 발생하기 쉬운 '요로감염'의 증상으로 옳은 것은?","o":["기침이 심해진다","소변 볼 때 통증이나 작열감이 있고, 소변이 자주 마렵고, 소변이 탁하거나 냄새가 심해진다","피부에 발진이 생�다","관절이 아프다","시력이 저하된다"],"e":"요로감염은 세균이 요도, 방광, 신장 등 요로에 감염을 일으키는 것입니다. 소변 볼 때 통증이나 작열감, 빈뇨(소변을 자주 봄), 잔뇨감, 소변이 탁하거나 냄새가 심해지는 것이 증상입니다. 노인에서는 갑작스러운 의식 변화, 식욕 저하 등 비전형적 증상으로 나타나기도 합니다. 수분을 충분히 섭취하고 회음부를 청결하게 유지하는 것이 예방에 중요합니다."},{"q":"'노인증후군'에 대한 설명으로 옳은 것은?","o":["한 가지 원인으로 발생하는 단일 질환이다","젊은 사람에게도 흔히 나타난다","노인에게만 나타나는 특이한 질환이다","치료가 불가능하다","노인에게 흔히 나타나는 복합적인 건강 문제로, 낙상·실금·인지기능 저하·기능 저하 등이 포함된다"],"e":"노인증후군은 단일 질환이 아니라 노인에게 흔히 나타나는 복합적인 건강 문제를 통칭하는 말입니다. 낙상, 실금, 인지기능 저하, 우울, 영양 불량, 다약제 복용, 기능 저하 등이 포함됩니다. 여러 원인이 복합적으로 작용하며, 예방과 조기 관리가 중요합니다."},{"q":"노인증후군의 공통된 특징으로 옳은 것은?","o":["한 가지 원인만 있다","한 가지 치료법으로 해결된다","여러 원인이 복합적으로 작용하고, 삶의 질을 크게 떨어뜨리며, 다학제적 접근이 필요하다","젊은 사람보다 회복이 빠르다","예방이 불가능하다"],"e":"노인증후군의 공통된 특징은 여러 원인이 복합적으로 작용하고, 삶의 질을 크게 떨어뜨리며, 의사·간호사·요양보호사 등 여러 직종이 함께 관리하는 다학제적 접근이 필요하다는 것입니다. 한 가지 원인이나 한 가지 치료법으로는 해결이 어렵습니다."},{"q":"'노쇠(허약)'에 대한 설명으로 옳은 것은?","o":["나이가 들면 누구나 반드시 노쇠해진다","노쇠는 갑자기 발생한다","노쇠는 치료나 예방이 불가능하다","노화와 질병으로 인해 신체·정신적 기능이 전반적으로 저하되어 외부 스트레스에 취약해진 상태이며, 적절한 관리로 예방·지연이 가능하다","노쇠는 체중이 증가하는 것이다"],"e":"노쇠(허약, frailty)란 노화와 질병으로 인해 신체·정신적 기능이 전반적으로 저하되어 작은 외부 스트레스(감기, 넘어짐 등)에도 큰 건강 문제가 발생할 수 있는 취약한 상태를 말합니다. 규칙적인 운동, 충분한 영양 섭취, 사회적 활동 참여 등으로 예방하거나 진행을 늦출 수 있습니다."},{"q":"노쇠의 대표적인 증상에 해당하지 않는 것은?","o":["의도하지 않은 체중 감소","피로감","보행 속도 감소","근력 저하","혈압 상승"],"e":"노쇠의 대표적인 5가지 증상은 ①의도하지 않은 체중 감소 ②피로감 ③보행 속도 감소 ④근력(악력) 저하 ⑤신체 활동량 감소입니다. 이 중 3가지 이상에 해당하면 노쇠, 1~2가지에 해당하면 전노쇠(노쇠 전 단계)로 판정합니다. 혈압 상승은 노쇠의 대표 증상이 아닙니다."},{"q":"노인의 '다약제 복용(폴리파머시)'의 문제점으로 옳은 것은?","o":["약을 많이 먹을수록 건강해진다","약물 간 상호작용은 발생하지 않는다","약물 부작용의 위험이 높아지고, 약물 간 상호작용이 발생할 수 있으며, 복약 순응도가 떨어진다","약이 많을수록 치료 효과가 비례하여 증가한다","의사에게 알리지 않아도 된다"],"e":"다약제 복용(폴리파머시)이란 여러 가지 약을 동시에 복용하는 것으로, 일반적으로 5가지 이상의 약을 복용하는 경우를 말합니다. 약물 부작용의 위험이 높아지고, 약물 간 상호작용이 발생할 수 있으며, 약이 너무 많아서 복약 순응도(약을 정확히 먹는 정도)가 떨어질 수 있습니다."},{"q":"노인에게 '탈수'가 발생하기 쉬운 이유로 옳은 것은?","o":["노인은 갈증을 잘 느끼므로 물을 많이 마신다","노인은 체내 수분량이 많다","갈증 감각이 둔해지고 체내 수분량이 감소하며, 신장 기능이 저하되어 수분 조절 능력이 떨어지기 때문이다","노인은 땀을 흘리지 않는다","탈수는 노인에게 위험하지 않다"],"e":"노인은 갈증을 느끼는 감각이 둔해지고, 체내 수분량이 젊은 사람보다 적으며, 신장의 수분 조절 기능이 저하되어 탈수가 발생하기 쉽습니다. 탈수는 의식 혼미, 혈압 저하, 신장 기능 악화 등 심각한 문제를 일으킬 수 있으므로 갈증을 느끼지 않아도 규칙적으로 수분을 섭취하는 것이 중요합니다."},{"q":"노인의 '영양 불량'을 의심할 수 있는 징후로 옳지 않은 것은?","o":["체중이 감소한다","피부가 건조하고 상처가 잘 낫지 않는다","머리카락이 빠지거나 가늘어진다","면역력이 저하되어 감염에 잘 걸린다","피부가 윤기 있고 탄력이 좋다"],"e":"노인의 영양 불량을 의심할 수 있는 징후에는 체중 감소, 피부 건조·상처 회복 지연, 머리카락 빠짐, 면역력 저하, 근력 감소, 피로감 등이 있습니다. 피부가 윤기 있고 탄력이 좋은 것은 영양 상태가 양호한 징후이므로 영양 불량의 징후가 아닙니다."},{"q":"노인의 시설 입소 시 적응을 돕기 위한 요양보호사의 역할로 옳은 것은?","o":["낯선 환경에 빨리 적응하도록 재촉한다","가족의 방문을 제한한다","이전 생활 습관은 모두 바꾸게 한다","친숙한 물건을 가져오게 하고, 따뜻하게 맞이하며, 시설 환경과 일과를 천천히 안내한다","다른 입소자와 비교하여 자극한다"],"e":"노인이 시설에 입소할 때는 큰 불안감과 상실감을 느낄 수 있습니다. 요양보호사는 대상자를 따뜻하게 맞이하고, 시설 환경과 일과를 천천히 안내하며, 가능하면 친숙한 물건(사진, 이불 등)을 가져오게 하여 안정감을 줍니다. 가족의 방문을 장려하고, 대상자의 이전 생활 습관을 존중해주는 것도 중요합니다."},{"q":"노인의 낙상 후 요양보호사의 대응으로 옳은 것은?","o":["즉시 일으켜 세운다","낙상 사실을 보고하지 않는다","대상자를 혼낸다","다음 날 병원에 가도록 한다","대상자의 상태를 확인하고 무리하게 움직이지 않게 한 후 간호사나 관리자에게 즉시 보고한다"],"e":"노인이 낙상했을 때 요양보호사는 먼저 대상자의 의식 상태, 통증 부위, 출혈 여부 등을 확인합니다. 골절이 의심되면 무리하게 움직이지 않게 하고, 즉시 간호사나 시설 관리자에게 보고합니다. 낙상 사실은 반드시 기록하고 보고해야 하며, 재발 방지를 위한 환경 점검도 필요합니다."}];
const C=["①","②","③","④","⑤"];
</script>
<div class="progress-bar" id="progBar"></div>
<div id="startScreen" class="container"><div class="header"><h1>요양보호사 양성과정<br>제5장 모의고사</h1><p>노화에 따른 변화와 질환 | 40문항</p></div><div class="card"><h2>응시자 정보</h2><div class="input-wrap"><label>이름을 입력하세요</label><input type="text" id="nameInput" placeholder="홍길동" autocomplete="off"></div><button class="btn btn-primary" onclick="startExam()">시험 시작</button></div><button class="btn btn-secondary" onclick="showAdmin()">관리자 모드</button></div>
<div id="examScreen" class="container hidden"><div class="progress-info" id="progInfo"></div><div id="examBody"></div><div class="submit-area"><button class="btn btn-danger" onclick="submitExam()">답안 제출</button></div></div>
<div id="lockScreen" class="container hidden"><div class="lock-screen"><div class="icon">🔒</div><h2 style="font-size:18px;margin-bottom:8px">답안이 제출되었습니다</h2><p style="font-size:14px;color:#94a3b8;margin-bottom:20px">결과를 확인하려면 결과확인 코드를 입력하세요</p><input type="text" class="lock-input" id="unlockInput" placeholder="코드" maxlength="10" inputmode="numeric"><button class="btn btn-primary" style="width:200px;margin:12px auto" onclick="tryUnlock()">결과 확인</button><p class="lock-msg" id="lockMsg"></p><p style="font-size:12px;color:#475569;margin-top:20px">시험 종료 후 관리자가 카카오톡에<br>결과확인 코드를 안내합니다</p></div></div>
<div id="resultScreen" class="container hidden"></div>
<div id="adminScreen" class="hidden"><div class="admin-panel"><div class="header"><h1>관리자 모드</h1><p>시험 운영 관리</p></div><div id="admContent"></div><button class="btn btn-secondary" onclick="hideAdmin()">← 메인으로 돌아가기</button></div></div>
<script>
let userName="",answers=new Array(TOTAL).fill(0),submitted=false;
function startExam(){const n=document.getElementById("nameInput").value.trim();if(!n){alert("이름을 입력해 주세요.");return}userName=n;const saved=localStorage.getItem("exam5v2_"+userName);if(saved){const d=JSON.parse(saved);answers=d.answers;submitted=true;document.getElementById("startScreen").classList.add("hidden");document.getElementById("lockScreen").classList.remove("hidden");return}buildExam();document.getElementById("startScreen").classList.add("hidden");document.getElementById("examScreen").classList.remove("hidden");updateProgress()}
function buildExam(){let h="",si=0;Q.forEach((q,i)=>{if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}h+=`<div class="q-card"><span class="q-num">${i+1}번</span><div class="q-text">${q.q}</div><div class="opt-list">`;q.o.forEach((o,j)=>{h+=`<div class="opt-btn" onclick="selectOpt(this,${i},${j+1})"><span class="opt-circle">${C[j]}</span><span>${o}</span></div>`});h+=`</div></div>`});document.getElementById("examBody").innerHTML=h}
function selectOpt(el,qi,oi){if(submitted)return;const opts=el.parentElement.children;for(let o of opts)o.classList.remove("selected");el.classList.add("selected");answers[qi]=oi;updateProgress()}
function updateProgress(){const a=answers.filter(a=>a>0).length;document.getElementById("progBar").style.width=(a/TOTAL*100).toFixed(0)+"%";document.getElementById("progInfo").textContent=`${a} / ${TOTAL} 문항 응답 완료`}
function submitExam(){const a=answers.filter(a=>a>0).length,u=TOTAL-a;let msg=`총 ${TOTAL}문항 중 ${a}문항 응답하셨습니다.`;if(u>0)msg+=`\n미응답 ${u}문항이 있습니다.`;msg+="\n\n제출하시겠습니까? 제출 후에는 수정할 수 없습니다.";if(!confirm(msg))return;submitted=true;localStorage.setItem("exam5v2_"+userName,JSON.stringify({answers,time:new Date().toISOString()}));document.getElementById("examScreen").classList.add("hidden");document.getElementById("lockScreen").classList.remove("hidden");document.getElementById("progBar").style.width="100%"}
function tryUnlock(){const code=document.getElementById("unlockInput").value.trim();if(code===UNLOCK_CODE)showResult();else{document.getElementById("lockMsg").textContent="코드가 일치하지 않습니다.";document.getElementById("lockMsg").style.color="#ef4444"}}
function showResult(){document.getElementById("lockScreen").classList.add("hidden");document.getElementById("resultScreen").classList.remove("hidden");let correct=0;answers.forEach((a,i)=>{if(a===ANS[i])correct++});const score=Math.round(correct/TOTAL*100),pass=correct>=PASS_SCORE;let h=`<div class="result-header"><div class="score-circle ${pass?"pass":"fail"}">${score}<small>점</small></div><div class="result-badge ${pass?"pass":"fail"}">${pass?"🎉 합격":"불합격"}</div><p style="font-size:14px;color:#94a3b8;margin-top:4px">${userName}님의 시험 결과</p><div class="stat-row"><div class="stat-item"><div class="num correct-mark">${correct}</div><div class="lbl">정답</div></div><div class="stat-item"><div class="num wrong-mark">${TOTAL-correct}</div><div class="lbl">오답</div></div><div class="stat-item"><div class="num" style="color:#60a5fa">${TOTAL}</div><div class="lbl">총 문항</div></div></div></div>`;let si=0;Q.forEach((q,i)=>{if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}const mine=answers[i],ans=ANS[i],isC=mine===ans,icon=mine===0?"⚠️":(isC?"✅":"❌");h+=`<div class="r-q"><span class="q-num">${i+1}번 ${icon}</span>`;if(mine===0)h+=`<span class="unanswered-badge">미응답</span>`;h+=`<div class="q-text" style="margin-top:10px">${q.q}</div>`;q.o.forEach((o,j)=>{let cls="opt-row";if(j+1===ans)cls+=" is-answer";else if(j+1===mine&&mine!==ans)cls+=" is-wrong";h+=`<div class="${cls}">${C[j]} ${o}</div>`});h+=`<div class="explain-box"><b>💡 해설:</b> ${q.e}</div></div>`});h+=`<div style="padding:20px 0;text-align:center"><button class="btn btn-secondary" onclick="resetExam()" style="max-width:300px;margin:0 auto">🔄 다시 풀기</button></div>`;document.getElementById("resultScreen").innerHTML=h}
function resetExam(){if(!confirm("저장된 결과를 삭제하고 처음부터 다시 풀겠습니까?"))return;localStorage.removeItem("exam5v2_"+userName);location.reload()}
function showAdmin(){const pw=prompt("관리자 비밀번호를 입력하세요:");if(pw!==ADMIN_PW){if(pw!==null)alert("비밀번호가 일치하지 않습니다.");return}document.getElementById("startScreen").classList.add("hidden");document.getElementById("adminScreen").classList.remove("hidden");let h=`<div class="adm-section"><h3>📋 시험 운영 가이드</h3><div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — index.html 파일을 GitHub Pages 또는 Netlify Drop에 업로드한 뒤, 생성된 링크를 카카오톡 단체방에 공유합니다.</div></div><div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생들이 링크를 터치하여 이름 입력 후 시험에 응시합니다.</div></div><div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 후</b> — 아래 카카오톡 안내 문구를 단체방에 전송합니다.</div></div></div>`;const m1="📝 제5장 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n⏰ 시험 시간: 제한 없음\n📌 총 40문항 (노화에 따른 변화와 질환)\n✅ 60점 이상 합격\n\n👉 시험 링크: (여기에 링크 붙여넣기)";const m2="✅ 시험이 종료되었습니다.\n\n결과확인 코드: "+UNLOCK_CODE+"\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n40문항 중 "+PASS_SCORE+"문항(60점) 이상이면 합격입니다.";h+=`<div class="adm-section"><h3>💬 카카오톡 발송 문구</h3><p style="font-size:12px;color:#94a3b8;margin-bottom:8px">아래 문구를 복사하여 카카오톡에 붙여넣기 하세요</p><div class="kakao-msg">${m1.replace(/\n/g,"<br>")}</div><button class="copy-btn" onclick="copyText(\`${m1}\`)">📋 복사하기</button><div class="kakao-msg" style="margin-top:16px">${m2.replace(/\n/g,"<br>")}</div><button class="copy-btn" onclick="copyText(\`${m2}\`)">📋 복사하기</button></div>`;h+=`<div class="adm-section"><h3>📊 정답표 (40문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">`;ANS.forEach((a,i)=>{h+=`<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">${i+1}.</span> <span style="color:#60a5fa;font-weight:700">${C[a-1]}</span></div>`});h+=`</div></div>`;document.getElementById("admContent").innerHTML=h}
function hideAdmin(){document.getElementById("adminScreen").classList.add("hidden");document.getElementById("startScreen").classList.remove("hidden")}
function copyText(t){navigator.clipboard.writeText(t).then(()=>alert("복사되었습니다!")).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta;alert("복사되었습니다!")})}
</script>
</body>
</html>
