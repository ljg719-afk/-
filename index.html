<script>
const ADMIN_PW="admin2025",UNLOCK_CODE="2025",PASS_SCORE=24,TOTAL=40;
const ANS=[3,2,2,1,4,3,3,2,4,2,3,2,3,3,2,3,1,2,2,2,3,4,3,4,2,4,3,5,5,2,5,3,2,4,4,2,3,3,3,3];
const SECS=[{t:"제1절 노화에 따른 변화와 특성",s:0,e:16},{t:"제2절 신체계통별 주요 질환",s:16,e:32},{t:"제3절 노인 증후군과 노쇠",s:32,e:40}];
const C=["①","②","③","④","⑤"];
const Q=[{q:"노인성 질환의 일반적인 임상적 특성으로 가장 옳은 것은?",o:["발병 원인이 명확하여 단일 질환으로 나타나는 경우가 많다.","초기 진단이 용이하며 급성으로 진행되어 경과가 매우 짧다.","정상적인 노화 과정과 구분하기 어려워 조기 발견이 지연될 수 있다.","질환의 예후가 좋아 합병증 발생률이 젊은 성인보다 낮다.","투약에 대한 반응이 일정하여 약물 중독의 위험이 없다."],e:"노인성 질환은 노화로 인한 생리적 퇴행과 질병의 경계가 불명확하여 조기 진단이 지연되어 합병증으로 이어지는 경우가 잦다."},{q:"고령 대상자에게 감염증(예: 폐렴) 발생 시 비전형적인 증상으로 적절한 것은?",o:["고열과 오한이 성인보다 훨씬 뚜렷하게 나타난다.","발열 증상 없이 식욕 부진, 전신 허약감, 인지 저하(섬망)가 나타날 수 있다.","염증 수치(CRP)가 감염 즉시 10배 이상으로 치솟는다.","호흡기 증상 외에는 다른 신체 부위로 절대 파급되지 않는다.","감염 초기에 오히려 기초대사량이 급감하여 수면에만 빠진다."],e:"노인은 면역 예비능 저하로 비전형적 양상(허약감, 식욕 상실, 섬망)으로 감염증이 발현되므로 세밀한 관찰이 요구된다."},{q:"노인의 체내 수분 변화와 관련된 설명으로 옳은 것은?",o:["체내 총수분량이 성인보다 높아 탈수에 강하다.","갈증에 대한 민감도가 둔화되어 수분 섭취가 부족해지기 쉽다.","신장의 소변 농축 능력이 증가하여 전해질 균형이 유지된다.","가벼운 장염에 걸려도 수분이 저절로 보충되어 안전하다.","심박출량이 증가하여 수분 대사가 촉진된다."],e:"갈증 중추 기능이 둔화되어 수분이 부족해도 갈증을 잘 느끼지 못하며, 이는 탈수증에 대한 극도의 취약성으로 이어진다."},{q:"노인의 약물 대사에서 부작용 위험이 높은 생리적 원인은?",o:["간의 크기 및 혈류량 감소로 해독 기능이 저하된다.","위산 분비가 과다하여 약물 흡수율이 급격히 증가한다.","장의 연동 운동이 활발해져 약물 체류 시간이 짧아진다.","신장의 사구체 여과율이 상승하여 약물이 빨리 배출된다.","피하 지방이 줄어들어 지용성 약물 축적이 일어나지 않는다."],e:"간 부피가 축소되고 혈류량이 줄어들며, 신장의 사구체 여과율이 저하되어 약물이 고농도로 잔류하여 부작용 위험이 증가한다."},{q:"요양보호사가 대상자의 정보를 관찰하여 시설장이나 가족에게 보고하는 역할은?",o:["숙련된 수발자의 역할","동기 유발자의 역할","옹호자의 역할","정보 전달자의 역할","말벗 및 상담자의 역할"],e:"'정보 전달자'는 이상 징후를 세밀히 관찰하여 시설장이나 의료진, 가족에게 신속하고 정확하게 보고하는 역할이다."},{q:"노화에 따른 피부계의 정상적인 변화로 옳은 것은?",o:["피하 지방이 두꺼워져 추위를 덜 타게 된다.","탄력성이 증가하여 상처가 빠르게 아문다.","피지 및 땀샘 분비가 감소하여 피부가 건조해지고 가려움증이 생긴다.","멜라닌 세포의 균일한 분포로 피부톤이 밝아진다.","조갑(손발톱)이 얇아지고 부드러워진다."],e:"피지선과 땀샘의 기능이 쇠퇴하여 피부 표면의 지질막이 약해지고 건조해지며 소양증(가려움증)을 유발한다."},{q:"노인의 위장관계 생리적 변화로 바른 것은?",o:["미각과 후각이 예민해져 식욕이 상승한다.","타액 분비가 증가하여 소화 효소 작용이 활발하다.","췌장 효소 및 위산 분비 저하로 소화 능력이 떨어진다.","대장 연동 운동이 촉진되어 변비가 줄어든다.","간 기능 활성화로 비타민 대사가 촉진된다."],e:"위 점막 위축으로 위산·펩신 분비가 저하되고, 췌장 소화 효소가 감소하여 단백질·지방의 소화 흡수 능력이 떨어진다."},{q:"호흡기계 기능 저하의 특성으로 옳은 것은?",o:["기침 반사가 강해져 이물질 제거 능력이 뛰어나다.","폐포의 탄력성 저하 및 호흡 근육 약화로 최대 호흡량이 감소한다.","기관지 섬모 운동이 활발해져 가래 배출이 원활하다.","가스 교환 효율이 100%에 달한다.","코 점막이 항상 습윤하게 유지된다."],e:"폐포 조직이 파괴되고 호흡 근육이 약화되어 최대 호흡 능력이 크게 감소하며, 잔기량이 증가하여 만성적 산소 부족에 놓이기 쉽다."},{q:"심혈관계 노화 변화로 가장 적절한 것은?",o:["최대 심박출량이 증가하여 운동 능력이 향상된다.","심장 판막이 유연해져 혈액 역류가 예방된다.","정맥 판막 기능 향상으로 하지 부종이 없다.","혈관 벽이 두꺼워지고 탄력성 저하로 고혈압 위험이 커진다.","안정 시 심박수가 2배 이상 유지된다."],e:"동맥 혈관 벽에 콜레스테롤이 침착되고 탄력 섬유가 소실되면서 동맥경화가 진행되며, 이는 고혈압의 주원인이 된다."},{q:"비뇨기계 변화로 인한 문제점 중 적절한 것은?",o:["방광 용적이 증가하여 소변을 오래 참을 수 있다.","요도 괄약근 약화로 기침이나 웃을 때 요실금이 발생하기 쉽다.","잔뇨량이 전혀 없어 배뇨 후 상쾌하다.","신장 혈류량이 급증하여 독소 배출이 빠르다.","전립선 위축으로 배뇨 속도가 빨라진다."],e:"요도 괄약근과 골반 기저근이 약화되어 기침·재채기 시 복압성 요실금이 빈번하게 발생한다."},{q:"뼈와 관절의 노화 변화로 바른 것은?",o:["조골세포가 파골세포보다 왕성하다.","척추 간판이 두꺼워져 키가 커진다.","인대와 건의 수분 감소로 관절 운동 범위가 제한되고 유연성이 떨어진다.","연골 재생 속도가 마모를 앞지른다.","근육 부피가 증가하여 뼈 보호력이 강해진다."],e:"인대와 건은 수분량이 감소하고 결합 조직이 섬유화되어 뻣뻣해지며 관절 가동 범위를 현격히 제한한다."},{q:"인지 및 기억력 변화로 올바른 것은?",o:["단기·장기 기억이 모두 향상된다.","장기 기억은 유지되나 단기 기억을 쉽게 잊어버린다.","정보 학습 속도가 젊은 층을 능가한다.","시공간 파악 능력은 끝까지 보존된다.","기억력 저하는 곧 알츠하이머 치매이다."],e:"해마의 기능이 쇠퇴하여 과거의 일은 기억하면서도 최근의 식사 내용 등 단기 기억은 쉽게 망각하는 것이 정상적 인지 저하이다."},{q:"'노안(Presbyopia)'의 직접적인 원인은?",o:["망막의 혈관 팽창","각막의 굴절력 증가","수정체의 탄력성 감소","홍채의 색소 탈실","안압의 비정상적 급락"],e:"수정체는 노화와 함께 수분이 감소하고 단백질 결합이 굳어지면서 탄력성을 상실하여 근거리 초점 조절이 어려워진다."},{q:"다약제 복용 노인의 올바른 투약 관리 방법은?",o:["요양보호사가 임의로 절반을 줄여 투약한다.","알약을 무조건 가루로 빻아서 제공한다.","약 달력(필박스)이나 기록지를 활용한다.","잊었을 때 다음에 두 배 용량을 투여한다.","녹차나 커피와 함께 복용하여 흡수를 돕는다."],e:"인지 기능 저하로 투약을 놓치거나 중복 복용할 위험이 크므로 투약 달력(필박스)이나 알람으로 체계적으로 관리해야 한다."},{q:"치매와 건망증을 구분하는 핵심적인 차이는?",o:["건망증은 단기, 치매는 장기 기억에만 문제가 생긴다.","건망증 환자는 잊은 사실을 인지하나 치매 환자는 모른다.","건망증은 공간 지각력 상실을 반드시 동반한다.","치매는 힌트를 주면 즉시 회복한다.","두 증상 모두 성격 변화를 동반하지 않는다."],e:"건망증은 힌트를 주면 기억해내고 자신의 망각을 인지하지만, 치매는 정보 자체가 저장되지 않아 병식이 결여된다."},{q:"여가 활동 지원 중 '자기계발 활동'에 해당하는 것은?",o:["가족 소풍이나 외식","텔레비전 시청이나 퍼즐 놀이","책 읽기, 그림 그리기, 서예 교실","성당이나 사찰 방문","영화관람이나 음악회 가기"],e:"책 읽기, 그림 그리기, 서예 교실, 창작 활동 등은 자아실현과 지적 자극을 돕는 '자기계발 활동'에 해당한다."},{q:"위 점막이 깊게 손상되어 위출혈이나 위천공을 유발할 수 있는 질환은?",o:["위궤양","간경화","대장 용종","과민성 대장 증후군","십이지장 궤양"],e:"위궤양은 위 점막 하층 이하까지 손상되어 위산에 의해 통증, 토혈, 흑색변, 천공이 발생할 수 있다."},{q:"설사하는 노인에 대한 올바른 요양보호 중재는?",o:["기름지고 매운 음식을 제공한다.","탈수 예방을 위해 따뜻한 물이나 전해질 음료를 충분히 마시게 한다.","임의로 지사제를 즉시 투여한다.","수분 섭취를 엄격히 제한한다.","생채소를 다량 섭취하게 한다."],e:"설사 시 가장 치명적인 것은 전해질 불균형과 급성 탈수이므로 수분과 전해질을 충분히 보충해야 한다."},{q:"기관지가 좁아지며 천명음과 호흡 곤란을 유발하는 질환은?",o:["폐기종","천식","흉막염","폐렴","기흉"],e:"천식은 기관지 평활근이 수축하고 점막이 부어올라 좁아진 기도를 통해 천명음과 호흡 곤란이 발생한다."},{q:"심부전 대상자에게 수분·염분 제한과 매일 체중 측정이 필요한 이유는?",o:["탈수를 예방하기 위해서","체액 저류로 인한 부종을 파악하고 심장 부담을 줄이기 위해서","칼슘 밀도를 높이기 위해서","체지방 연소를 촉진하기 위해서","소화 효소 활동을 억제하기 위해서"],e:"염분은 수분을 끌어당겨 체액 저류를 가중시키므로 제한하고, 체중 측정으로 부종 정도를 평가한다."},{q:"관상동맥이 혈전으로 완전히 막혀 심근이 괴사하는 응급 질환은?",o:["협심증","심부전","심근경색","정맥류","판막 폐쇄 부전증"],e:"심근경색은 관상동맥이 완전히 막혀 심근이 괴사하며 니트로글리세린으로도 가슴 통증이 가라앉지 않는 초응급 상태다."},{q:"체중 부하 관절에서 연골이 닳아 통증을 유발하는 질환은?",o:["류마티스 관절염","골연화증","통풍","퇴행성 관절염(골관절염)","점액낭염"],e:"퇴행성 관절염은 무릎·고관절 연골이 마모되어 뼈와 뼈가 직접 마찰하면서 발생하는 비염증성 질환이다."},{q:"골밀도 저하로 가벼운 낙상에도 골절이 발생하며 칼슘·비타민 D 보충이 필수인 질환은?",o:["골수염","퇴행성 관절염","골다공증","척추관 협착증","인대 파열"],e:"골다공증은 뼈의 칼슘이 빠져나가 미세 구조가 파괴되어 미세한 충격에도 골절이 발생한다."},{q:"전립선 비대증의 주요 임상 증상은?",o:["소변 줄기가 굵고 강해진다.","배뇨 횟수가 급감한다.","잔뇨감이 없다.","배뇨 시작이 지연되고 힘을 주어야 하며 야간뇨가 있다.","전신 발열이 항상 동반된다."],e:"전립선이 요도를 압박하여 소변 줄기가 약해지고 배뇨 시작이 지연되며 야간뇨를 동반한다."},{q:"백내장의 특징적인 증상은?",o:["안압 상승으로 극심한 안구 통증","밝은 불빛에서 눈부심이 심하고 빛 주위에 무지개가 보인다.","터널 시야 결손","노안 증상의 단순 악화","지속적인 유루증"],e:"백내장은 통증이 없으며, 밝은 곳에서 극심한 눈부심과 빛 주위 무지개 잔상이 특징이다."},{q:"노인성 난청 대상자와의 효과적인 의사소통 방법은?",o:["높은 주파수의 큰 목소리로 고함친다.","입술을 가리고 말한다.","소음 있는 환경에서 대화한다.","소음 없는 장소에서 얼굴을 보며 저음으로 또박또박 천천히 말한다.","보청기를 최고 고음역대로 설정한다."],e:"고주파수 영역 소리 감지가 떨어지므로, 정면을 마주 보고 소음 차단 후 저음으로 천천히 또박또박 말해야 한다."},{q:"욕창의 가장 효과적인 예방 조치는?",o:["하루에 한 번 체위를 변경한다.","소변에 젖은 상태를 유지한다.","침대 2시간마다, 휠체어 1시간마다 체위를 변경하여 압력을 분산시킨다.","발적 부위를 강하게 마사지한다.","상처에 도넛 모양 고무 링을 대어준다."],e:"욕창 방지의 핵심은 모세혈관 혈류 차단 시간을 최소화하는 것이다. 침상 2시간마다, 휠체어 1시간마다 체위 변경이 필요하다."},{q:"뇌졸중 'FAST' 원칙에 해당하지 않는 것은?",o:["F(Face) - 안면 마비 확인","A(Arms) - 한쪽 팔 힘 빠짐 확인","S(Speech) - 발음 어눌함 확인","T(Time) - 시간 기록 및 119 신고","T(Temperature) - 체온 40도 확인"],e:"FAST는 Face, Arms, Speech, Time으로 구성되며 체온(Temperature)은 무관하다."},{q:"파킨슨병 4대 운동 증상에 속하지 않는 것은?",o:["안정 시 떨림(진전)","근육의 경직","서동증","자세 불안정·종종걸음","하반신 완전 마비"],e:"4대 징후는 진전, 경직, 서동증, 자세 불안정이다. 완전 마비는 뇌졸중의 특징이다."},{q:"당뇨병 환자의 식은땀·두통·손떨림 시 대처법은?",o:["고혈당이므로 인슐린을 과량 투여한다.","저혈당 발작이므로 사탕·주스 등 단당류를 신속히 섭취하게 한다.","당뇨발이므로 뜨거운 물에 담근다.","고혈압 뇌출혈이므로 혈압약을 추가 투여한다.","소화불량이므로 소화제를 먹이고 눕힌다."],e:"혈당이 70mg/dL 이하로 급락하면 식은땀, 두근거림, 손떨림이 나타나며, 의식이 있으면 15g의 단순당을 즉각 섭취시킨다."},{q:"안압 상승으로 시야가 주변부부터 좁아지고 방치 시 실명에 이르는 질환은?",o:["각막염","결막염","황반 변성","백내장","녹내장"],e:"녹내장은 안압 상승이나 시신경 혈류 장애로 시신경이 점진적으로 손상되어 주변부 시야부터 좁아지며 방치 시 실명에 이른다."},{q:"섬망(Delirium)의 특징으로 옳은 것은?",o:["수개월에 걸쳐 서서히 발현된다.","의식 수준이 항상 맑고 안정적이다.","탈수·감염 등에 의해 갑자기 발현되며 기복이 심하고 가역적(회복 가능)이다.","뇌세포의 영구적 파괴가 원인이다.","신체적 원인과 전혀 무관하다."],e:"섬망은 감염·탈수 등으로 갑자기 발생하고 밤낮의 기복이 심하지만 기저 질환 치료 시 회복(가역성)된다."},{q:"'노쇠(Frailty)'의 개념으로 가장 올바른 것은?",o:["외형적 노화 과정만을 지칭하는 용어","생리적 예비능이 줄어들어 작은 충격에도 크게 무너지는 취약한 상태","급성 감염으로 일시적 체력 저하","인지 기능이 영구 손상된 상태","건강한 노인이 단순히 기력이 떨어지는 현상"],e:"노쇠는 사소한 스트레스에도 생리적 보상 기전을 가동하지 못해 항상성을 회복하지 못하고 붕괴되는 전반적인 취약 상태다."},{q:"노인 증후군의 특성으로 옳지 않은 것은?",o:["여러 만성 질환이 복합적으로 작용하여 발생한다.","노쇠, 근감소증, 낙상, 요실금, 섬망 등이 포함된다.","'기능 장애' 모델에 기반하여 평가해야 한다.","노화의 필연적 결과이므로 의료·사회적 지원으로도 완화할 수 없다.","방치 시 연쇄적 기능 저하를 일으킨다."],e:"노인 증후군은 적절한 의료·영양·재활 중재로 충분히 완화 가능한 예방 가능한 병태다."},{q:"노쇠의 핵심 증상으로 근육량·근력이 급감하는 질환은?",o:["골다공증","근막동통 증후군","파킨슨병","근감소증(Sarcopenia)","류마티스 관절염"],e:"근감소증은 30대 이후부터 서서히 진행되어 노년기에 가속화되며 근력과 보행 속도 등 신체 수행 능력을 추락시킨다."},{q:"근감소증이 노인 삶에 미치는 가장 치명적 파급 효과는?",o:["시력의 영구적 상실","보행·균형 능력 저하로 낙상·골절 위험 급증, 장기 요양 시설 입소 확률 상승","위산 과다로 영양 불균형","면역 세포 변형으로 백혈병 전환","청각 유모세포 파괴로 난청"],e:"골격근 소실로 보행 속도가 느려지고 균형 감각이 무너져 치명적 낙상을 유발하며 장기 요양 시설 입소 확률이 급증한다."},{q:"노쇠 예방을 위해 가장 필수적인 중재 방법은?",o:["침상에서 절대 안정을 취한다.","단백질을 배제하고 탄수화물만 극대화한다.","유산소 운동뿐만 아니라 저항성(근력) 운동을 철저히 챙긴다.","외부 활동을 전면 차단한다.","비타민 D 섭취를 완전히 중단한다."],e:"노쇠와 근감소증 예방의 가장 확실한 비약물적 처방은 유산소 운동과 함께 근력 강화(저항성) 운동을 식단과 병행하는 것이다."},{q:"'낙상'을 유발하는 노쇠 관련 신체적 원인은?",o:["영양 과잉으로 BMI 급증","상체 근력의 비정상적 발달","근감소증으로 보행 속도 저하, 하체 근력 약화 및 균형 감각 상실","달팽이관 기능 향상으로 청력 예민화","피하 지방의 전신적 과다 축적"],e:"근감소증으로 코어 근육과 하지 근력이 약화되어 자세 조절 반사가 기능을 상실하면서 넘어지게 된다."},{q:"노쇠·근감소증 중증도를 평가하기 위해 가장 널리 측정하는 것은?",o:["심전도 검사","흉부 X-ray","악력 및 보행 속도(Gait speed) 측정","뇌파 검사","식전/식후 혈당 변화 측정"],e:"악력계를 쥐어 전신 근육의 질을 유추하고, 4미터 거리를 걷는 시간(보행 속도, 0.8m/s 이하 시 노쇠 의심)을 측정하는 것이 가장 정확한 평가 도구다."},{q:"'다학제적 다면적 접근'이 필수적인 근본적 이유는?",o:["병원 수익을 창출하기 위해","하나의 기저 질환만 고치면 모든 기능이 회복되기 때문","의학·영양·재활·심리·사회·환경 요인이 복잡하게 얽혀 있어 다양한 전문가의 통합적 개입이 필요하기 때문","경증 질환 노인의 체류 기간을 연장하기 위해","환자와 가족의 의사를 배제하기 위해"],e:"노인 증후군은 약 한 알이나 수술 한 번으로 해결되지 않으며, 다양한 전문가가 한 팀이 되어 다면적이고 포괄적인 중재를 동시에 가해야 한다."}];

let userName="",myAns=Array(TOTAL).fill(0),cSec=0,myRes=null;
function go(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0)}
function acnt(){return myAns.filter(a=>a>0).length}
function startExam(){userName=document.getElementById("inpName").value.trim();if(!userName)return alert("이름을 입력하세요.");myAns=Array(TOTAL).fill(0);myRes=null;cSec=0;drawExam();go("pgExam")}
function drawExam(){document.getElementById("eUser").textContent="응시자: "+userName;const s=SECS[cSec];document.getElementById("eSec").textContent=s.t;document.getElementById("eCnt").textContent=acnt();let tabs="";SECS.forEach((sc,i)=>{const cnt=myAns.slice(sc.s,sc.e).filter(a=>a>0).length;tabs+=`<button class="tab${i===cSec?" on":""}" onclick="cSec=${i};drawExam();window.scrollTo(0,0)">${sc.t.substring(0,9)}…<small>${cnt}/${sc.e-sc.s}</small></button>`});document.getElementById("eTabs").innerHTML=tabs;let h="";for(let i=s.s;i<s.e;i++){const q=Q[i],sel=myAns[i];h+=`<div class="qc${sel>0?" done":""}"><div class="qt"><span class="qn">${i+1}</span>${q.q}</div>`;for(let j=0;j<q.o.length;j++){h+=`<div class="qo${sel===j+1?" sel":""}" onclick="myAns[${i}]=${j+1};drawExam()"><span class="qo-c">${C[j]}</span><span class="qo-t">${q.o[j]}</span></div>`}h+=`</div>`}h+=`<div class="nav">`;if(cSec>0)h+=`<button class="btn btn-ghost" onclick="cSec--;drawExam();window.scrollTo(0,0)">이전 절</button>`;if(cSec<2)h+=`<button class="btn btn-blue" onclick="cSec++;drawExam();window.scrollTo(0,0)">다음 절</button>`;if(cSec===2){const ac=acnt();h+=`<button class="btn ${ac===TOTAL?"btn-red":"btn-green"}" style="font-size:15px" onclick="doSubmit()">${ac===TOTAL?"최종 제출":"미완성 제출"} (${ac}/${TOTAL})</button>`}h+=`</div>`;document.getElementById("eQs").innerHTML=h}
function doSubmit(){const ac=acnt();if(ac<TOTAL){if(!confirm(`아직 ${TOTAL-ac}문항을 풀지 않았습니다.\n제출하시겠습니까?`))return}else{if(!confirm("답안을 최종 제출하시겠습니까?"))return}const score=myAns.reduce((s,a,i)=>s+(a===ANS[i]?1:0),0);const pct=Math.round(score/TOTAL*100);myRes={name:userName,answers:[...myAns],score,pct,time:new Date().toLocaleString("ko-KR")};try{localStorage.setItem("myResult40v2",JSON.stringify(myRes))}catch{}drawResult();go("pgResult")}
function drawResult(){if(!myRes){try{myRes=JSON.parse(localStorage.getItem("myResult40v2"))}catch{}}if(!myRes){go("pgHome");return}let h=`<div class="card res-box"><div style="font-size:12px;color:#94a3b8">답안이 성공적으로 제출되었습니다</div><h2 style="font-size:20px;font-weight:800;margin-top:6px">${myRes.name}님의 시험 결과</h2><div style="font-size:11px;color:#64748b;margin-top:4px">${myRes.time}</div><div class="lock-box"><div class="icon">🔒</div><div class="lock-title">결과확인 코드를 입력하세요</div><div class="lock-desc">시험 종료 후 선생님이 카카오톡으로<br>알려주시는 코드를 입력하시면 됩니다.</div><input id="inpCode" class="input" placeholder="결과확인 코드 입력" style="text-align:center;font-size:20px;letter-spacing:4px;margin-bottom:10px"><button class="btn btn-blue" onclick="checkCode()">결과 확인하기</button></div><div id="resultArea"></div></div><button class="btn btn-ghost" onclick="go('pgHome')" style="margin-top:12px">처음으로 돌아가기</button>`;document.getElementById("resContent").innerHTML=h}
function checkCode(){
  const code=document.getElementById("inpCode").value.trim();
  if(code!==UNLOCK_CODE)return alert("코드가 틀렸습니다.\n선생님이 알려주신 코드를 다시 확인하세요.");
  const s=myRes.score,pct=myRes.pct;
  let h=`<div style="margin-top:16px;text-align:center"><div class="res-score" style="color:${s>=PASS_SCORE?"#4ade80":"#f87171"}">${s}<span>/${TOTAL}</span></div><div style="font-size:14px;color:#94a3b8;margin-top:4px">(${pct}점 환산)</div><div style="font-size:16px;font-weight:700;margin-top:4px;color:${s>=PASS_SCORE?"#4ade80":"#f87171"}">${s>=PASS_SCORE?"합격":"불합격"}</div></div><div class="divider"></div><div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px"><span class="rv-badge rv-badge-ok">✅ 정답 ${s}문항</span><span class="rv-badge rv-badge-ng">❌ 오답 ${TOTAL-s}문항</span></div>`;
  SECS.forEach(sec=>{
    h+=`<div class="rv-sec">${sec.t}</div><div class="rv">`;
    for(let i=sec.s;i<sec.e;i++){
      const q=Q[i],correct=ANS[i],mine=myRes.answers[i],ok=mine===correct;
      h+=`<div class="rv-card ${ok?"rv-ok":"rv-ng"}"><div class="rv-head"><span class="rv-q"><span class="qn">${i+1}</span>${q.q}</span><span class="rv-icon">${ok?"✅":"❌"}</span></div>`;
      for(let j=0;j<q.o.length;j++){
        const on=j+1,isC=on===correct,isW=!ok&&on===mine;
        let cls="rv-opt";if(isC)cls+=" rv-opt-correct";else if(isW)cls+=" rv-opt-wrong";
        h+=`<div class="${cls}"><span class="rv-opt-c">${C[j]}</span><span class="rv-opt-t">${q.o[j]}</span>`;
        if(isC)h+=`<span class="rv-opt-label rv-label-ok">정답</span>`;
        else if(isW)h+=`<span class="rv-opt-label rv-label-ng">내 답</span>`;
        h+=`</div>`;
      }
      if(mine===0&&!ok)h+=`<div style="font-size:11px;color:#fca5a5;margin-top:4px;padding-left:10px">⚠️ 미응답</div>`;
      h+=`<div class="rv-exp">💡 <b>해설:</b> ${q.e}</div></div>`;
    }
    h+=`</div>`;
  });
  document.getElementById("resultArea").innerHTML=h;
  document.querySelector(".lock-box").style.display="none";
}
function admLogin(){if(document.getElementById("inpAdmPw").value===ADMIN_PW){drawAdmin();go("pgAdmin")}else alert("비밀번호가 틀렸습니다.")}
function drawAdmin(){let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><div><div class="adm-title">📋 관리자 모드</div><div class="adm-sub">시험 운영 가이드 (40문항)</div></div><button class="btn btn-ghost" style="width:auto;padding:8px 16px;font-size:12px" onclick="go('pgHome')">나가기</button></div>`;h+=`<div class="adm-section"><h3>🔑 결과확인 코드</h3><p style="font-size:13px;color:#94a3b8;margin-bottom:8px">시험이 끝난 후 아래 코드를 카카오톡에 보내주세요.</p><div class="adm-code">${UNLOCK_CODE}</div></div>`;h+=`<div class="adm-section"><h3>📱 카카오톡 시험 운영 순서</h3><div style="margin-top:14px"><div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — 사이트 링크를 카카오톡 단체방에 공유합니다.</div></div><div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생들이 이름 입력 후 40문항에 답변하고 제출합니다.</div></div><div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 종료 후</b> — 카카오톡에 아래 메시지를 보냅니다:<br><div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;margin-top:8px;font-size:13px;color:#e2e8f0">수고하셨습니다! 시험이 종료되었습니다.<br>결과확인 코드: <b style="color:#60a5fa;font-size:16px">${UNLOCK_CODE}</b><br>제출 화면에서 위 코드를 입력하면<br>점수와 해설을 확인할 수 있습니다.<br>40문항 중 24문항(60점) 이상이면 합격입니다.</div></div></div></div>`;h+=`<div class="adm-section"><h3>📊 정답표 (40문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">`;ANS.forEach((a,i)=>{h+=`<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">${i+1}.</span> <span style="color:#60a5fa;font-weight:700">${C[a-1]}</span></div>`});h+=`</div></div>`;document.getElementById("admContent").innerHTML=h}
</script>
